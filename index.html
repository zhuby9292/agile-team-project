<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Course Selector Tool - Sign In</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>
    <header id="main-header">
        <div class="container">
            <h1>Course Selector Tool</h1>
            <p class="tagline">Sign in to manage your course preferences and suggested unit selections.</p>
        </div>
    </header>

    <nav>
        <div class="container">
            <a href="index.html">Sign In</a>
        </div>
    </nav>

    <main>
        <div class="container">
            <section class="content-section">
                <h2>Sign In</h2>
                <p>
                    Enter your email address and password to access your account.
                </p>

                <form id="signin-form">
                    <div class="form-group">
                        <label for="user-email">Email Address</label>
                        <input type="email" id="user-email" class="form-control" placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label for="user-password">Password</label>
                        <input type="password" id="user-password" class="form-control" placeholder="Enter your password">
                    </div>

                    <p>
                        <button type="button" class="btn btn-primary" onclick="loginUser()">
                            <span class="glyphicon glyphicon-log-in"></span> Log In
                        </button>

                        <button type="button" class="btn btn-default" onclick="goToSignUp()">
                            <span class="glyphicon glyphicon-user"></span> Sign Up
                        </button>
                    </p>
                </form>

                <p id="signin-output">Your sign in result will appear here.</p>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Created for the Course Selector Tool project.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
</body>
</html>
