<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Course Selector Tool - Sign In</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <header id="main-header">
        <div class="container">
            <h1>Course Selector Tool</h1>
            <p class="tagline">Plan your units more easily and explore suitable course combinations.</p>
        </div>
    </header>

    <main class="signin-page">
        <div class="container">
            <div class="signin-box">
                <h2>Welcome Back</h2>
                <p class="signin-text">Sign in to continue to your course selector account.</p>

                <form id="signin-form">
                    <div class="form-group">
                        <label for="user-email">Email Address</label>
                        <input type="email" id="user-email" class="form-control" placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label for="user-password">Password</label>
                        <input type="password" id="user-password" class="form-control" placeholder="Enter your password">
                    </div>

                    <button type="button" class="btn btn-primary btn-block" onclick="loginUser()">
                        <span class="glyphicon glyphicon-log-in"></span> Log In
                    </button>
                </form>

                <p id="signin-output"></p>

                <hr>

                <p class="signup-text">
                    Don’t have an account?
                </p>

                <button type="button" class="btn btn-default btn-block" onclick="goToSignUp()">
                    <span class="glyphicon glyphicon-user"></span> Sign Up
                </button>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Created for the Course Selector Tool project.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
