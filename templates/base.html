<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Course Planner{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="app-page">

    <header class="app-header">
        <div class="container app-nav">

            <div class="brand">
                <span class="brand-icon glyphicon glyphicon-calendar"></span>
                <span class="brand-name">Course Planner</span>
            </div>

            {% block nav %}
            <nav class="auth-links">
                <a href="{{ url_for('index') }}">Sign In</a>
                <a href="{{ url_for('signup') }}">Sign Up</a>
            </nav>
            {% endblock %}

            <button type="button" class="theme-toggle" onclick="toggleDarkMode()" aria-label="Toggle dark mode">
                <span class="theme-toggle-label">Dark</span>
                <span class="theme-toggle-thumb"></span>
            </button>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="auth-footer">
        <div class="container">
            <p>Created for the Agile Web Development Group Project.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    {% block scripts %}
    {% endblock %}

</body>

</html>
