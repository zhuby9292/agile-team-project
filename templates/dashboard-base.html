{% extends "base.html" %}

{% block nav %}
<nav class="auth-links app-links">
    {% if is_admin %}
        <a href="{{ url_for('admin_dashboard') }}">{{ _("Admin") }}</a>
        <a href="{{ url_for('logout') }}">{{ _("Logout") }}</a>
    {% else %}
        <a href="{{ url_for('homepage') }}">{{ _("Dashboard") }}</a>
        <a href="{{ url_for('course_selection') }}">{{ _("Courses") }}</a>
        <a href="{{ url_for('timetable') }}">{{ _("Timetable") }}</a>
        <a href="{{ url_for('logout') }}">{{ _("Logout") }}</a>
    {% endif %}
</nav>
{% endblock %}
