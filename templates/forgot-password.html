<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Planner - Forgot Password</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="auth-page">
    <header class="auth-header">
        <div class="container auth-nav">
            <div class="brand">
                <span class="brand-icon glyphicon glyphicon-calendar"></span>
                <span class="brand-name">Course Planner</span>
            </div>

            <nav class="auth-links">
                <a href="{{ url_for('index') }}">Sign In</a>
                <a href="{{ url_for('signup') }}">Sign Up</a>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <div class="container">
            <section class="signin-card" style="max-width: 560px; margin: 40px auto;">
                <div class="signin-card-header">
                    <h2>Forgot Password</h2>
                    <p>Enter your email address and we will send you a verification code.</p>
                </div>

                <form id="forgot-password-form">
                    <div class="form-group">
                        <label for="recovery-email">Email Address</label>
                        <input type="email" id="recovery-email" class="form-control" placeholder="Enter your email address">
                    </div>

                    <button type="button" class="btn signin-btn" onclick="sendVerificationCode()">
                        Send Verification Code
                    </button>

                    <button type="button" class="btn forgot-btn" onclick="goToSignIn()">
                        Back to Sign In
                    </button>
                </form>

                <p id="forgot-output" class="signin-output">
                    Enter your email address to receive a verification code.
                </p>
            </section>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
