{% extends "base.html" %}

{% block title %}
Forgot Password
{% endblock %}

{% block content %}
<div class="container">
    <section class="signin-card" style="max-width: 560px; margin: 40px auto;">
        <div class="signin-card-header">
            <h2>Forgot Password</h2>
            <p>Enter your email address and we will send you a verification code.</p>
        </div>

        <form id="forgot-password-form">
            <div class="form-group">
                <label for="recovery-email">Email Address</label>
                <input type="email" id="recovery-email" class="form-control" placeholder="Enter your email address">
            </div>

            <button type="button" class="btn signin-btn" onclick="sendVerificationCode()">
                Send Verification Code
            </button>

            <button type="button" class="btn forgot-btn" onclick="goToSignIn()">
                Back to Sign In
            </button>
        </form>

        <p id="forgot-output" class="signin-output">
            Enter your email address to receive a verification code.
        </p>
    </section>
</div>
{% endblock %}
