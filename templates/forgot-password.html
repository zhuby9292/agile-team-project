{% extends "base.html" %}

{% block title %}
{{ _('Forgot Password') }}
{% endblock %}

{% block content %}
<div class="container">
    <section class="signin-card" style="max-width: 560px; margin: 40px auto;">
        <div class="signin-card-header">
            <h2>{{ _('Forgot Password') }}</h2>
            <p>{{ _('Enter your email address and we will send you a verification code.') }}</p>
        </div>

        <form id="forgot-password-form">
            <div class="form-group">
                <label for="recovery-email">{{ _('Email Address') }}</label>
                <input type="email"
                    id="recovery-email"
                    class="form-control"
                    placeholder="{{ _('Enter your email address') }}">
            </div>

            <button type="button" class="btn signin-btn" onclick="sendVerificationCode()">
                {{ _('Send Verification Code') }}
            </button>

            <button type="button" class="btn forgot-btn" onclick="goToSignIn()">
                {{ _('Back to Sign In') }}
            </button>
        </form>

        <p id="forgot-output" class="signin-output">
            {{ _('Enter your email address to receive a verification code.') }}
        </p>
    </section>
</div>
{% endblock %}
