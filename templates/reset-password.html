<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Planner - Reset Password</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="auth-page">
    <header class="auth-header">
        <div class="container auth-nav">
            <div class="brand">
                <span class="brand-icon glyphicon glyphicon-calendar"></span>
                <span class="brand-name">Course Planner</span>
            </div>

            <nav class="auth-links">
                <a href="{{ url_for('index') }}">Sign In</a>
                <a href="{{ url_for('signup') }}">Sign Up</a>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <div class="container">
            <section class="signin-card reset-card">
                <div class="signin-card-header">
                    <h2>Reset Password</h2>
                    <p>Enter the verification code and create a new password.</p>
                </div>

                <form id="reset-password-form">
                    <div class="form-group">
                        <label>Verification Code</label>

                        <div class="verification-boxes">
                            <input type="text" maxlength="1" class="code-input"
                                   oninput="handleCodeInput(event)"
                                   onkeydown="handleCodeBackspace(event)"
                                   onpaste="handleCodePaste(event)">

                            <input type="text" maxlength="1" class="code-input"
                                   oninput="handleCodeInput(event)"
                                   onkeydown="handleCodeBackspace(event)">

                            <input type="text" maxlength="1" class="code-input"
                                   oninput="handleCodeInput(event)"
                                   onkeydown="handleCodeBackspace(event)">

                            <input type="text" maxlength="1" class="code-input"
                                   oninput="handleCodeInput(event)"
                                   onkeydown="handleCodeBackspace(event)">
                        </div>
                    </div>

                    <div class="form-group reset-password-field">
                        <label for="new-password">New Password</label>
                        <input type="password"
                               id="new-password"
                               class="form-control"
                               placeholder="Enter new password"
                               disabled>
                    </div>

                    <button type="button"
                            id="reset-password-btn"
                            class="btn signin-btn"
                            onclick="resetPasswordWithCode()"
                            disabled>
                        Reset Password
                    </button>

                    <button type="button"
                            class="btn forgot-btn"
                            onclick="goToSignIn()">
                        Back
                    </button>
                </form>

                <p id="reset-output" class="signin-output">
                    Enter the verification code sent to your email.
                </p>
            </section>
        </div>
    </main>

    <footer class="auth-footer">
        <div class="container">
            <p>Created for the Agile Web Development Group Project.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
