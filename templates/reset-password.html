{% extends "base.html" %}

{% block title %}
{{ _('Reset Password') }}
{% endblock %}

{% block content %}
<div class="container">
    <section class="signin-card reset-card">
        <div class="signin-card-header">
            <h2>{{ _('Reset Password') }}</h2>
            <p>{{ _('Enter the verification code and create a new password.') }}</p>
        </div>

        <form id="reset-password-form">
            <div class="form-group">
                <label>{{ _('Verification Code') }}</label>

                <div class="verification-boxes">
                    <input type="text" maxlength="1" class="code-input" oninput="handleCodeInput(event)"
                        onkeydown="handleCodeBackspace(event)" onpaste="handleCodePaste(event)">

                    <input type="text" maxlength="1" class="code-input" oninput="handleCodeInput(event)"
                        onkeydown="handleCodeBackspace(event)">

                    <input type="text" maxlength="1" class="code-input" oninput="handleCodeInput(event)"
                        onkeydown="handleCodeBackspace(event)">

                    <input type="text" maxlength="1" class="code-input" oninput="handleCodeInput(event)"
                        onkeydown="handleCodeBackspace(event)">
                </div>
            </div>

            <div class="form-group reset-password-field">
                <label for="new-password">{{ _('New Password') }}</label>
                <input type="password"
                    id="new-password"
                    class="form-control"
                    placeholder="{{ _('Enter new password') }}"
                    disabled>
            </div>

            <button type="button"
                id="reset-password-btn"
                class="btn signin-btn"
                onclick="resetPasswordWithCode()"
                disabled>
                {{ _('Reset Password') }}
            </button>

            <button type="button" class="btn forgot-btn" onclick="goToSignIn()">
                {{ _('Back') }}
            </button>
        </form>

        <p id="reset-output" class="signin-output">
            {{ _('Enter the verification code sent to your email.') }}
        </p>
    </section>
</div>
{% endblock %}
