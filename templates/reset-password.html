{% extends "base.html" %}

{% block title %}
Reset Password
{% endblock %}

{% block content %}
<div class="container">
    <section class="signin-card reset-card">
        <div class="signin-card-header">
            <h2>Reset Password</h2>
            <p>Enter the verification code and create a new password.</p>
        </div>

        <form id="reset-password-form">
            <div class="form-group">
                <label>Verification Code</label>

                <div class="verification-boxes">
                    <input type="text" maxlength="1" class="code-input" oninput="handleCodeInput(event)"
                        onkeydown="handleCodeBackspace(event)" onpaste="handleCodePaste(event)">

                    <input type="text" maxlength="1" class="code-input" oninput="handleCodeInput(event)"
                        onkeydown="handleCodeBackspace(event)">

                    <input type="text" maxlength="1" class="code-input" oninput="handleCodeInput(event)"
                        onkeydown="handleCodeBackspace(event)">

                    <input type="text" maxlength="1" class="code-input" oninput="handleCodeInput(event)"
                        onkeydown="handleCodeBackspace(event)">
                </div>
            </div>

            <div class="form-group reset-password-field">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" class="form-control" placeholder="Enter new password" disabled>
            </div>

            <button type="button" id="reset-password-btn" class="btn signin-btn" onclick="resetPasswordWithCode()"
                disabled>
                Reset Password
            </button>

            <button type="button" class="btn forgot-btn" onclick="goToSignIn()">
                Back
            </button>
        </form>

        <p id="reset-output" class="signin-output">
            Enter the verification code sent to your email.
        </p>
    </section>
</div>
{% endblock %}
